name: Release DMG

on:
  release:
    types:
      - published
      - prereleased

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build unsigned DMG
        run: cargo xtask package-macos all

      - name: Prepare versioned DMG asset
        run: cp target/xtask/macos/Jabberwok.dmg "target/xtask/macos/Jabberwok-${{ github.event.release.tag_name }}.dmg"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jabberwok-${{ github.event.release.tag_name }}-macos-dmg
          path: target/xtask/macos/Jabberwok-${{ github.event.release.tag_name }}.dmg
          if-no-files-found: error

      - name: Upload DMG to existing GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: target/xtask/macos/Jabberwok-${{ github.event.release.tag_name }}.dmg
