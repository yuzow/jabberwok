name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS Release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build unsigned DMG
        run: cargo xtask package-macos all

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jabberwok-${{ github.ref_name }}-macos-dmg
          path: target/xtask/macos/Jabberwok.dmg
          if-no-files-found: error

      - name: Create GitHub release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/xtask/macos/Jabberwok.dmg
